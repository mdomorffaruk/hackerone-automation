scope:
  targets:
    - "example.com"
  scope_file: null
  out_of_scope:
    - "example.out.of.scope.com"

wordlists:
  subdomains: "/snap/seclists/current/Discovery/DNS/subdomains-top1million-5000.txt"
  content: "/snap/seclists/current/Discovery/Web-Content/common.txt"

prioritization:
  nuclei_min_score: 8

output:
  directory: "output"

global_delay: 0.75
threads: 3

profiles:
  safe:
    global_delay: 1.0
    threads: 2
    tools:
      subfinder: { flags: "-all -silent -rl 15" }
      dnsx: { flags: "-silent -rl 15" }
      httpx: { flags: "-silent -json -follow-redirects -title -tech-detect -status-code -content-length -web-server -location -cname -timeout 10 -rl 8" }
      katana: { flags: "-silent -jc -aff -d 2 -rl 2 -timeout 10" }
      naabu: { flags: "-silent -top-ports 200 -rate 250" }
      feroxbuster: { flags: "--threads 2 --depth 1 -C 404 --auto-tune --timeout 10" }
      nuclei: { flags: "-silent -jsonl -rl 3 -timeout 10 -retries 1" }
  normal:
    global_delay: 0.5
    threads: 3
    tools:
      subfinder: { flags: "-all -silent -rl 25" }
      dnsx: { flags: "-silent -rl 25" }
      httpx: { flags: "-silent -json -follow-redirects -title -tech-detect -status-code -content-length -web-server -location -cname -timeout 10 -rl 12" }
      katana: { flags: "-silent -jc -aff -d 3 -rl 4 -timeout 10" }
      naabu: { flags: "-silent -top-ports 500 -rate 600" }
      feroxbuster: { flags: "--threads 3 --depth 2 -C 404 --auto-tune --timeout 10" }
      nuclei: { flags: "-silent -jsonl -rl 5 -timeout 10 -retries 1" }
  aggressive:
    global_delay: 0.2
    threads: 5
    tools:
      subfinder: { flags: "-all -silent -rl 40" }
      dnsx: { flags: "-silent -rl 40" }
      httpx: { flags: "-silent -json -follow-redirects -title -tech-detect -status-code -content-length -web-server -location -cname -timeout 10 -rl 20" }
      katana: { flags: "-silent -jc -aff -d 3 -rl 8 -timeout 10" }
      naabu: { flags: "-silent -top-ports 1000 -rate 1500" }
      feroxbuster: { flags: "--threads 6 --depth 2 -C 404 --auto-tune --timeout 10" }
      nuclei: { flags: "-silent -jsonl -rl 10 -timeout 10 -retries 1" }

tools:
  subfinder:
    enabled: true
    flags: "-all -silent -rl 15"
  assetfinder:
    enabled: true
    flags: "--subs-only"
  amass:
    enabled: true
    flags: "enum -passive"
  dnsx:
    enabled: true
    flags: "-silent -rl 15"
  httpx:
    enabled: true
    flags: "-silent -json -follow-redirects -title -tech-detect -status-code -content-length -web-server -location -cname -timeout 10 -rl 8"
  katana:
    enabled: true
    flags: "-silent -jc -aff -d 2 -rl 2 -timeout 10"
  wafw00f:
    enabled: true
    flags: ""
  gau:
    enabled: true
    flags: ""
  waybackurls:
    enabled: true
    flags: ""
  naabu:
    enabled: true
    flags: "-silent -top-ports 200 -rate 250"
  feroxbuster:
    enabled: true
    flags: "--threads 2 --depth 1 -C 404 --auto-tune --timeout 10"
  nuclei:
    enabled: true
    flags: "-silent -jsonl -rl 3 -timeout 10 -retries 1"
    severity: ["medium", "high", "critical"]
    templates:
      - "http/takeovers/"
      - "http/exposures/"
      - "http/exposed-panels/"
      - "http/misconfiguration/"
      - "http/default-logins/"
      - "http/cves/"
